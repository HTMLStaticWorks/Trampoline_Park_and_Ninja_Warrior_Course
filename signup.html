<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | GravityForce</title>
  <meta name="description"
    content="Create a GravityForce customer account to sign liability waivers, pre-book birthday parties, and view jump receipts.">
  <link rel="stylesheet" href="assets/css/style.css">

  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.png">
  <meta name="keywords" content="trampoline, ninja warrior, birthday party, fun, entertainment">
  <meta name="author" content="GravityForce">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    .hover-underline {
      text-decoration: none;
      transition: text-decoration 0.2s;
    }

    .hover-underline:hover {
      text-decoration: underline;
    }

    /* Password wrapper with eye icon */
    .pw-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .pw-wrapper input {
      padding-right: 46px !important;
    }

    .pw-eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 0;
    }

    [dir="rtl"] .pw-eye-btn {
      right: auto;
      left: 12px;
    }

    [dir="rtl"] .pw-wrapper input {
      padding-right: 14px !important;
      padding-left: 46px !important;
    }

    .pw-eye-btn:hover {
      color: var(--accent-primary);
    }

    .pw-wrapper.error input {
      border-color: var(--danger);
    }

    .pw-error-msg {
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 5px;
      display: none;
    }

    .pw-error-msg.show {
      display: block;
    }
  </style>
</head>

<body
  style="min-height: 100vh; display: flex; flex-direction: column; background-color: var(--bg-primary);">

  <!-- RTL + Theme Toolbar -->
  <div style="width: 100%; display: flex; justify-content: flex-end; gap: 10px; padding: 20px;" id="auth-toolbar">
    <button class="rtl-toggle" id="rtlToggleBtn" aria-label="Toggle RTL layout" title="RTL Toggle"
      style="width:40px; height:40px; border-radius:50%; background:var(--glass-bg); border:1px solid var(--text-muted); color:var(--text-primary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--transition);">
      <svg style="width:20px; height:20px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
      </svg>
    </button>
    <button class="theme-toggle" id="themeToggleBtn" aria-label="Toggle theme" title="Toggle Theme"
      style="width:40px; height:40px; border-radius:50%; background:var(--glass-bg); border:1px solid var(--text-muted); color:var(--text-primary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--transition);">
      <svg style="width:20px; height:20px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m2.828-9.9a5 5 0 117.071 7.071 5 5 0 01-7.071-7.071z" />
      </svg>
    </button>
  </div>

  <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem;">
    <div class="glass-panel" style="width: 100%; max-width: 480px; padding: 2.5rem 2.5rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html" class="logo-link" style="justify-content: center; font-size: 1.5rem;">
        <div class="logo-icon">G</div>
        <span>GravityForce<span class="logo-dot">.</span></span>
      </a>
      <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.95rem;">Register for a premium member
        account</p>
    </div>

    <form id="signupForm">
      <div class="form-group" style="margin-bottom: 1rem;">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" id="fullName" class="form-control" placeholder="Alex Jumper" required>
      </div>

      <div class="form-group" style="margin-bottom: 1rem;">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="alex@example.com" required>
      </div>

      <div class="form-group" style="margin-bottom: 1rem;">
        <label for="password" class="form-label">Password</label>
        <div class="pw-wrapper">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          <button type="button" class="pw-eye-btn" onclick="toggleEye('password', this)"
            aria-label="Toggle password visibility">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <div class="pw-wrapper" id="confirm-pw-wrapper">
          <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password"
            oninput="checkPasswordMatch()" required>
          <button type="button" class="pw-eye-btn" onclick="toggleEye('confirmPassword', this)"
            aria-label="Toggle confirm password visibility">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
        <p class="pw-error-msg" id="pw-match-error">Passwords do not match.</p>
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:0.5rem; margin-bottom: 1.5rem;">
        <input type="checkbox" id="agreeTerms" style="accent-color: var(--secondary);" required>
        <label for="agreeTerms"
          style="font-size:0.8rem; color:var(--text-secondary); cursor:pointer; user-select:none;">I agree to the Terms
          of Service and Privacy Policy</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>

    <!-- Divider -->
    <div
      style="display: flex; align-items: center; gap: 12px; margin: 24px 0; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">
      <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
      or register with
      <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
    </div>

    <!-- Social Buttons -->
    <div style="display: flex; flex-direction: column; gap: 11px;">
      <button type="button" class="btn btn-outline"
        style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 11px; padding: 0.6rem 1.5rem;"
        onclick="window.location.href='dashboard.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>
      <button type="button" class="btn btn-outline"
        style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 11px; padding: 0.6rem 1.5rem;"
        onclick="window.location.href='dashboard.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047v-2.66c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.265h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z" />
        </svg>
        Continue with Facebook
      </button>
      <button type="button" class="btn btn-outline"
        style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 11px; padding: 0.6rem 1.5rem;"
        onclick="window.location.href='dashboard.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
            fill="currentColor" />
        </svg>
        Continue with Apple
      </button>
    </div>

    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
      Already have an account? <a href="login.html" class="hover-underline"
        style="color: var(--secondary); font-weight:600;">Log in</a>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    function toggleEye(inputId, btn) {
      const input = document.getElementById(inputId);
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeOff = btn.querySelector('.eye-off');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.style.display = 'none';
        eyeOff.style.display = 'inline';
      } else {
        input.type = 'password';
        eyeOpen.style.display = 'inline';
        eyeOff.style.display = 'none';
      }
    }

    function checkPasswordMatch() {
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const wrapper = document.getElementById('confirm-pw-wrapper');
      const errMsg = document.getElementById('pw-match-error');
      if (confirm && pw !== confirm) {
        wrapper.classList.add('error');
        errMsg.classList.add('show');
      } else {
        wrapper.classList.remove('error');
        errMsg.classList.remove('show');
      }
    }

    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (pw !== confirm) {
        checkPasswordMatch();
        document.getElementById('confirmPassword').focus();
        return;
      }

      // Update state in localStorage dynamically
      const initialData = {
        profile: {
          fullName: fullName,
          email: email,
          phone: "(555) 123-4567",
          emergencyContactName: "Not Provided",
          emergencyContactPhone: "Not Provided"
        },
        loyaltyPoints: 0,
        waiver: {
          signed: false,
          signedDate: null,
          signatureData: null
        },
        membership: {
          active: false,
          tier: "No Active Membership",
          renewalDate: null,
          price: null
        },
        bookings: [],
        passes: [],
        purchases: []
      };

      localStorage.setItem('gravity_db', JSON.stringify(initialData));

      // Visual transitions
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Registering Account...';
      submitBtn.disabled = true;

      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1000);
    });
  </script>
  </div>
</body>

</html>
